[profile.default]
src = 'contracts'
out = 'out'
libs = ['lib']
test = 'test'
script = 'script'
cache_path = 'cache_forge'
auto_detect_solc = true
evm_version = 'cancun'
optimizer = true
optimizer_runs = 200
gas_reports = ['*']
# Suppress compiler warnings coming from vendored library code (Uniswap v4,
# OpenZeppelin, Sablier, prb-math, etc.). We cannot fix upstream, so silencing
# keeps our build output focused on warnings in our own code.
ignored_warnings_from = ['lib']

[rpc_endpoints]
polygon = "${POLYGON_RPC_URL}"
base = "${BASE_RPC_URL}"

[fuzz]
runs = 256
max_test_rejects = 65536

[invariant]
runs = 256
depth = 15

# Fast iteration: skips fuzz/invariant cost but still runs each property once.
# Usage: FOUNDRY_PROFILE=fast forge test
# For full fuzz coverage, drop the env var (uses [profile.default]).
[profile.fast]
fuzz = { runs = 1 }
invariant = { runs = 1, depth = 1 }

# CI: moderate fuzz coverage without the full 256-run cost.
[profile.ci]
fuzz = { runs = 64 }
invariant = { runs = 64, depth = 10 }

[fmt]
line_length = 120
tab_width = 4

[lint]
# Lint is opt-in via `forge lint`; not run on every build. This matches `main`.
# Run it explicitly when auditing code quality: `forge lint`.
lint_on_build = false

